<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Page Layout ── */
body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Inter', system-ui, sans-serif;
  line-height: 1.5;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── Header ── */
.gallery-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 48px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-left h1 {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  color: #fff;
  letter-spacing: -0.02em;
}
.header-left .tagline {
  color: #555;
  font-size: 0.8rem;
  font-weight: 400;
  border-left: 1px solid #333;
  padding-left: 16px;
}

/* ── Filter Tabs (in header) ── */
.filter-bar {
  display: flex;
  gap: 6px;
}
.filter-btn {
  background: transparent;
  color: #666;
  border: 1px solid transparent;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.25s ease;
  user-select: none;
}
.filter-btn:hover { color: #aaa; }
.filter-btn.active {
  background: #fff;
  color: #000;
  border-color: #fff;
}

/* Badge colors */
.badge-pro { background: #2a2a2a; color: #aaa; }
.badge-creative { background: #ff5722; color: #fff; }
.badge-minimal { background: #f0f0f0; color: #333; }
.badge-cultural { background: #c53d43; color: #fff; }

/* ── Stage Area ── */
.stage-area {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 48px 24px;
}

.stage-preview {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  border-radius: 16px;
  overflow: hidden;
  background: #111;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
  cursor: pointer;
  transition: box-shadow 0.5s ease;
}
.stage-preview:hover {
  box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
}

/* Carousel inside stage */
.stage-carousel {
  display: flex;
  width: 500%;
  height: 100%;
  transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
}
.stage-carousel .slide-panel {
  width: calc(100% / 5);
  height: 100%;
  flex-shrink: 0;
}

/* Stage nav arrows */
.stage-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
}
.stage-preview:hover .stage-arrow { opacity: 1; pointer-events: auto; }
.stage-arrow:hover { background: rgba(255,255,255,0.15); }
.stage-arrow.disabled { opacity: 0 !important; pointer-events: none; }
.stage-arrow-left { left: 16px; }
.stage-arrow-right { right: 16px; }

/* ── Stage Info Bar ── */
.stage-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 4px 0;
}
.stage-info-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stage-style-name {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700;
  font-size: 1.4rem;
  color: #fff;
  transition: opacity 0.4s;
}
.stage-style-meta {
  font-size: 0.8rem;
  color: #555;
  display: flex;
  align-items: center;
  gap: 12px;
}
.stage-cat-badge {
  display: inline-block;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 100px;
  font-weight: 500;
}
.stage-info-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Dots */
.stage-dots {
  display: flex;
  gap: 6px;
}
.stage-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  padding: 0;
}
.stage-dot.active {
  background: #fff;
  transform: scale(1.3);
}

/* Slide type label */
.slide-type-label {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* CTA Button */
.stage-cta {
  background: #fff;
  color: #000;
  border: none;
  padding: 10px 24px;
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.stage-cta:hover {
  background: #e0e0e0;
  transform: scale(1.02);
}

/* ── Filmstrip ── */
.filmstrip-area {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 48px 48px;
}
.filmstrip-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 12px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
.filmstrip-scroll::-webkit-scrollbar { height: 4px; }
.filmstrip-scroll::-webkit-scrollbar-track { background: transparent; }
.filmstrip-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.filmstrip-item {
  flex-shrink: 0;
  width: 180px;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 2px solid transparent;
  position: relative;
  background: #141414;
}
.filmstrip-item:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.15);
}
.filmstrip-item.active {
  border-color: #fff;
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.filmstrip-preview {
  width: 100%;
  aspect-ratio: 16/10;
  overflow: hidden;
}
.filmstrip-name {
  padding: 8px 10px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.filmstrip-item.active .filmstrip-name { color: #fff; }

/* ── View Toggle ── */
.header-controls {
  display: flex;
  align-items: center;
  gap: 16px;
}
.view-toggle {
  display: flex;
  background: #1a1a1a;
  border-radius: 8px;
  padding: 3px;
  border: 1px solid #2a2a2a;
}
.view-toggle-btn {
  background: transparent;
  border: none;
  color: #555;
  width: 32px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.view-toggle-btn:hover { color: #aaa; }
.view-toggle-btn.active { background: #333; color: #fff; }
.view-toggle-btn svg { width: 14px; height: 14px; }

/* ── Overview Grid ── */
.overview-area {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 48px 80px;
  display: none;
}
.overview-area.visible { display: block; }
.overview-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.overview-card {
  border-radius: 14px;
  overflow: hidden;
  background: #111;
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  position: relative;
}
.overview-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
}
.overview-card-preview {
  width: 100%;
  aspect-ratio: 16/10;
  overflow: hidden;
  position: relative;
}
.overview-card-info {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.overview-card-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.overview-card-name {
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: #e0e0e0;
}
.overview-card-cat {
  font-size: 0.65rem;
  color: #555;
}
.overview-card-arrow {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #555;
  font-size: 0.9rem;
  transition: all 0.2s;
  flex-shrink: 0;
}
.overview-card:hover .overview-card-arrow {
  border-color: #666;
  color: #fff;
  background: rgba(255,255,255,0.05);
}

/* Per-style card glow on hover */
.overview-card[data-id="keynote-noir"]:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 40px rgba(0,113,227,0.12); }
.overview-card[data-id="terminal-green"]:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 30px rgba(57,211,83,0.1); }
.overview-card[data-id="ink-wash"]:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 30px rgba(197,61,67,0.08); }
.overview-card[data-id="creative-voltage"]:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 30px rgba(212,255,0,0.1); }
.overview-card[data-id="retro-arcade"]:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 20px rgba(254,231,97,0.08); }
.overview-card[data-id="pop-art"]:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 30px rgba(255,45,85,0.15); }

/* Stage back button */
.stage-back {
  background: none;
  border: none;
  color: #555;
  font-size: 0.8rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
  letter-spacing: 0.01em;
}
.stage-back:hover { color: #fff; }

/* Hidden states for view switching */
.stage-area.hidden, .filmstrip-area.hidden { display: none; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .gallery-header { flex-direction: column; gap: 12px; padding: 16px 20px; }
  .header-left .tagline { display: none; }
  .header-controls { width: 100%; justify-content: space-between; }
  .stage-area { padding: 24px 20px 16px; }
  .stage-preview { border-radius: 12px; }
  .stage-info { flex-direction: column; gap: 12px; align-items: flex-start; }
  .filmstrip-area { padding: 20px 20px 32px; }
  .filmstrip-item { width: 140px; }
  .overview-area { padding: 24px 20px 60px; }
  .overview-grid { gap: 16px; }
}
@media (max-width: 600px) {
  .filter-bar { flex-wrap: wrap; gap: 4px; }
  .filter-btn { padding: 4px 10px; font-size: 0.65rem; }
  .stage-arrow { width: 32px; height: 32px; font-size: 0.9rem; }
  .filmstrip-item { width: 120px; }
  .overview-grid { grid-template-columns: 1fr; }
}

/* ── Mini Slide Shared ── */
.mini-slide {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 12%;
}
.mini-slide .title {
  position: relative;
  z-index: 2;
}
.mini-slide .subtitle {
  position: relative;
  z-index: 2;
  margin-top: 4px;
}

/* Full-screen slide */
.full-slide {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 8%;
}
.full-slide .title { position: relative; z-index: 2; }
.full-slide .subtitle { position: relative; z-index: 2; margin-top: 12px; }

/* ── Content slide elements ── */
.full-slide .content-heading {
  position: relative; z-index: 2;
  margin-bottom: 32px;
}
.full-slide .bullet-list {
  position: relative; z-index: 2;
  list-style: none;
  padding: 0;
  text-align: left;
  width: 100%;
  max-width: 700px;
}
.full-slide .bullet-list li {
  padding: 12px 0;
  border-bottom: 1px solid rgba(128,128,128,0.15);
  display: flex;
  align-items: center;
  gap: 16px;
}
.full-slide .bullet-list li::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.4;
  flex-shrink: 0;
}

/* ── Stats slide elements ── */
.full-slide .stat-grid {
  position: relative; z-index: 2;
  display: flex;
  gap: 64px;
  text-align: center;
}
.full-slide .stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.full-slide .stat-number {
  font-size: clamp(3rem, 8vw, 7rem);
  font-weight: 800;
  line-height: 1;
}
.full-slide .stat-label {
  font-size: clamp(0.8rem, 1.5vw, 1.2rem);
  opacity: 0.6;
}

@media (max-width: 600px) {
  .full-slide .stat-grid { gap: 32px; flex-direction: column; }
  .full-slide .bullet-list li { font-size: 0.9rem; }
}

/* ========================================
   INDIVIDUAL STYLE DEFINITIONS
   ======================================== */

/* 1. Keynote Noir */
.style-keynote-noir { background: #000; }
.style-keynote-noir .title { font-family: 'Inter Tight', sans-serif; font-weight: 800; color: #fff; }
.style-keynote-noir .subtitle { font-family: 'Inter', sans-serif; font-weight: 300; color: #86868b; }
.style-keynote-noir .content-heading { font-family: 'Inter Tight', sans-serif; font-weight: 800; color: #fff; font-size: clamp(1.8rem, 4vw, 3.5rem); }
.style-keynote-noir .bullet-list { font-family: 'Inter', sans-serif; font-weight: 300; color: #c0c0c0; font-size: clamp(0.9rem, 1.5vw, 1.3rem); }
.style-keynote-noir .stat-number { font-family: 'Inter Tight', sans-serif; color: #fff; }
.style-keynote-noir .stat-label { font-family: 'Inter', sans-serif; color: #86868b; }
.mini-slide.style-keynote-noir .title { font-size: clamp(0.9rem, 2.5vw, 1.4rem); }
.mini-slide.style-keynote-noir .subtitle { font-size: clamp(0.45rem, 1vw, 0.6rem); }
.full-slide.style-keynote-noir .title { font-size: clamp(3rem, 8vw, 7rem); }
.full-slide.style-keynote-noir .subtitle { font-size: clamp(1rem, 2vw, 1.8rem); }

/* 4. Terminal Green */
.style-terminal-green { background: #0d1117; }
.style-terminal-green .chrome {
  position: absolute; top: 0; left: 0; right: 0; height: 24px;
  background: #161b22; border-bottom: 1px solid #30363d;
  display: flex; align-items: center; padding-left: 10px; gap: 5px; z-index: 3;
}
.style-terminal-green .chrome-dot { width: 7px; height: 7px; border-radius: 50%; }
.style-terminal-green .chrome-dot.r { background: #f85149; }
.style-terminal-green .chrome-dot.y { background: #e3b341; }
.style-terminal-green .chrome-dot.g { background: #39d353; }
.style-terminal-green .title {
  font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #39d353;
}
.style-terminal-green .subtitle { font-family: 'JetBrains Mono', monospace; color: #7d8590; font-weight: 400; }
.style-terminal-green .prompt { color: #39d353; font-family: 'JetBrains Mono', monospace; }
.style-terminal-green .content-heading { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #39d353; font-size: clamp(1.5rem, 3vw, 2.5rem); }
.style-terminal-green .bullet-list { font-family: 'JetBrains Mono', monospace; color: #7d8590; font-size: clamp(0.8rem, 1.3vw, 1.1rem); }
.style-terminal-green .stat-number { font-family: 'JetBrains Mono', monospace; color: #39d353; }
.style-terminal-green .stat-label { font-family: 'JetBrains Mono', monospace; color: #7d8590; }
.mini-slide.style-terminal-green { align-items: flex-start; padding-top: 20%; }
.mini-slide.style-terminal-green .title { font-size: clamp(0.65rem, 1.6vw, 0.95rem); }
.mini-slide.style-terminal-green .subtitle { font-size: clamp(0.38rem, 0.7vw, 0.5rem); }
.full-slide.style-terminal-green { align-items: flex-start; padding-top: 12%; }
.full-slide.style-terminal-green .chrome { height: 40px; padding-left: 16px; gap: 8px; }
.full-slide.style-terminal-green .chrome-dot { width: 12px; height: 12px; }
.full-slide.style-terminal-green .title { font-size: clamp(2rem, 4vw, 4rem); }
.full-slide.style-terminal-green .subtitle { font-size: clamp(0.8rem, 1.3vw, 1.2rem); }
.style-terminal-green .cursor {
  display: inline-block; width: 0.6em; height: 1.1em; background: #39d353; vertical-align: text-bottom;
  animation: blink 1s step-end infinite; margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* 6. Cinema Scope */
.style-cinema-scope { background: #0a0a0a; }
.style-cinema-scope .letterbox-top, .style-cinema-scope .letterbox-bot {
  position: absolute; left: 0; right: 0; background: #000; z-index: 3;
}
.style-cinema-scope .letterbox-top { top: 0; height: 8%; }
.style-cinema-scope .letterbox-bot { bottom: 0; height: 8%; }
.style-cinema-scope .title {
  font-family: 'Bebas Neue', sans-serif; font-weight: 400; color: #fff;
  letter-spacing: 0.15em; text-transform: uppercase;
}
.style-cinema-scope .subtitle { font-family: 'Lato', sans-serif; font-weight: 300; color: #999; }
.style-cinema-scope .gold-line {
  width: 50px; height: 1px; background: #d4a843; margin-top: 6px; position: relative; z-index: 2;
}
.style-cinema-scope .content-heading { font-family: 'Bebas Neue', sans-serif; color: #fff; font-size: clamp(1.8rem, 4vw, 3.5rem); letter-spacing: 0.1em; }
.style-cinema-scope .bullet-list { font-family: 'Lato', sans-serif; font-weight: 300; color: #bbb; font-size: clamp(0.9rem, 1.5vw, 1.3rem); }
.style-cinema-scope .stat-number { font-family: 'Bebas Neue', sans-serif; color: #d4a843; letter-spacing: 0.05em; }
.style-cinema-scope .stat-label { font-family: 'Lato', sans-serif; color: #999; }
.mini-slide.style-cinema-scope .title { font-size: clamp(0.9rem, 2.2vw, 1.4rem); }
.mini-slide.style-cinema-scope .subtitle { font-size: clamp(0.4rem, 0.75vw, 0.5rem); }
.full-slide.style-cinema-scope .title { font-size: clamp(3rem, 7vw, 7rem); letter-spacing: 0.25em; }
.full-slide.style-cinema-scope .subtitle { font-size: clamp(0.9rem, 1.5vw, 1.5rem); }
.full-slide.style-cinema-scope .gold-line { width: 100px; height: 2px; margin-top: 16px; }

/* ================================================================
   UNIQUE SLIDE ANIMATIONS — Per-Style @keyframes
   ================================================================ */

/* ── Ink Wash Animations ── */
@keyframes inkBrushFadeIn {
  0% { opacity: 0; transform: translateY(20px) scaleX(0.3); filter: blur(4px); }
  60% { opacity: 0.7; transform: translateY(5px) scaleX(0.9); filter: blur(1px); }
  100% { opacity: 1; transform: translateY(0) scaleX(1); filter: blur(0); }
}
@keyframes inkDrip {
  0% { transform: scaleY(0); transform-origin: top; opacity: 0; }
  40% { transform: scaleY(1.15); opacity: 1; }
  60% { transform: scaleY(0.95); }
  100% { transform: scaleY(1); opacity: 1; }
}
@keyframes sealStamp {
  0% { transform: scale(2.5) rotate(-15deg); opacity: 0; }
  50% { transform: scale(0.9) rotate(2deg); opacity: 0.9; }
  70% { transform: scale(1.05) rotate(-1deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes mistDrift {
  0% { opacity: 0.15; transform: translateX(-5%); }
  50% { opacity: 0.35; transform: translateX(3%); }
  100% { opacity: 0.15; transform: translateX(-5%); }
}
@keyframes inkMountainReveal {
  0% { clip-path: inset(100% 0 0 0); }
  100% { clip-path: inset(0 0 0 0); }
}

/* ── Nihon Modern Animations ── */
@keyframes nihonUnderline {
  0% { transform: scaleX(0); transform-origin: left; }
  100% { transform: scaleX(1); transform-origin: left; }
}
@keyframes nihonFadeUp {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes nihonPulse {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.15); opacity: 1; }
}
@keyframes nihonRakeLines {
  0% { background-position: 0 0; }
  100% { background-position: 0 10px; }
}

/* ── Warm Minimal Animations ── */
@keyframes warmScaleUp {
  0% { opacity: 0; transform: scale(0.85); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes warmFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes steamWisp {
  0% { opacity: 0.7; transform: translateY(0) scaleX(1); }
  50% { opacity: 0.3; transform: translateY(-25px) scaleX(1.4); }
  100% { opacity: 0; transform: translateY(-50px) scaleX(0.6); }
}
@keyframes warmLift {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── Notion Animations ── */
@keyframes notionCursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes notionCardSlide {
  0% { transform: translateX(0); }
  30% { transform: translateX(0); }
  40% { transform: translateX(calc(100% + 12px)); }
  100% { transform: translateX(calc(100% + 12px)); }
}
@keyframes notionExpand {
  0% { max-height: 0; opacity: 0; padding: 0 12px; }
  100% { max-height: 200px; opacity: 1; padding: 8px 12px; }
}
@keyframes notionFadeIn {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── Claude Style Animations ── */
@keyframes claudeTypingDot {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}
@keyframes claudeGlowPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(218,119,86,0); text-shadow: none; }
  50% { box-shadow: 0 0 20px 4px rgba(218,119,86,0.15); text-shadow: 0 0 20px rgba(218,119,86,0.3); }
}
@keyframes claudeDataFlow {
  0% { left: 0; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { left: 100%; opacity: 0; }
}
@keyframes claudeBubbleIn {
  0% { opacity: 0; transform: translateY(12px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes claudeNodePulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.3); opacity: 1; }
}

/* ── Ink Wash unique slide styles ── */
.ink-poem-container { writing-mode: vertical-rl; display: flex; gap: 32px; height: 55vh; position: relative; z-index: 2; }
.ink-poem-line { font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif; font-size: clamp(1.4rem, 3vw, 2.2rem); color: #2a2018; letter-spacing: 0.3em; animation: inkBrushFadeIn 1.2s ease both; }

.ink-mountain-layer { position: absolute; bottom: 0; left: 0; right: 0; }
.ink-mountain-layer.m1 { height: 100%; background: #d4cec4; clip-path: polygon(0 70%, 15% 35%, 30% 55%, 45% 20%, 60% 45%, 75% 25%, 90% 50%, 100% 30%, 100% 100%, 0 100%); opacity: 0.3; }

.ink-mountain-layer.m3 { height: 55%; background: #8a8070; clip-path: polygon(0 50%, 10% 25%, 25% 45%, 40% 10%, 55% 35%, 70% 15%, 85% 40%, 100% 20%, 100% 100%, 0 100%); opacity: 0.5; }
.ink-mist { position: absolute; left: -10%; right: -10%; height: 80px; background: linear-gradient(180deg, rgba(247,244,239,0) 0%, rgba(247,244,239,0.7) 40%, rgba(247,244,239,0.7) 60%, rgba(247,244,239,0) 100%); z-index: 2; animation: mistDrift 8s ease-in-out infinite; }

/* ── Keynote Noir Animations ── */
@keyframes knFadeIn {
  0% { opacity: 0; transform: translateY(24px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes knSlowReveal {
  0% { opacity: 0; filter: blur(4px); transform: translateY(8px); }
  100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}
@keyframes knBulletIn {
  0% { opacity: 0; transform: translateX(-12px); }
  100% { opacity: 1; transform: translateX(0); }
}
@keyframes knStatReveal {
  0% { opacity: 0; transform: scale(0.7); filter: blur(12px); }
  70% { opacity: 1; transform: scale(1.02); filter: blur(0); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}
@keyframes knCountUp {
  0% { opacity: 0; transform: scale(0.6); filter: blur(8px); }
  60% { opacity: 1; transform: scale(1.05); filter: blur(0); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}
@keyframes knGlowDot {

  50% { box-shadow: 0 0 18px 6px rgba(0,122,255,0.8); }
}

  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.05); }
}
@keyframes knDeviceMaterialize {
  0% { opacity: 0; box-shadow: 0 0 0 0 rgba(0,113,227,0), inset 0 0 0 0 rgba(0,113,227,0); }
  50% { opacity: 0.6; box-shadow: 0 0 40px 8px rgba(0,113,227,0.15), inset 0 0 30px 4px rgba(0,113,227,0.05); }
  100% { opacity: 1; box-shadow: 0 0 60px 12px rgba(0,113,227,0.1), inset 0 0 40px 6px rgba(0,113,227,0.03); }
}
@keyframes knScreenGlow {
  0%, 100% { background: radial-gradient(ellipse at center, rgba(0,113,227,0.06) 0%, transparent 70%); }
  50% { background: radial-gradient(ellipse at center, rgba(0,113,227,0.12) 0%, transparent 70%); }
}
@keyframes knGradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes knGlowAmbient {
  0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.35; transform: translate(-50%, -50%) scale(1.1); }
}

}

const BADGE_CLASS = { pro: 'badge-pro', creative: 'badge-creative', minimal: 'badge-minimal', cultural: 'badge-cultural' };
const BADGE_LABEL = { pro: 'Professional', creative: 'Creative', minimal: 'Minimal', cultural: 'Cultural' };

const CAT_ORDER = ['pro', 'creative', 'minimal', 'cultural'];

function slideInner(s, size, variant) {
  variant = variant || 'title';
  var cls = size === 'full' ? 'full-slide' : 'mini-slide';
  var styleCls = 'style-' + s.id;

  // Get decorative elements for each style
  function getDeco() {
    switch (s.id) {
      case 'keynote-noir': return { before: '<div class="kn-blue-glow" style="width:80%;height:80%;opacity:0.15;"></div>', after: '' };

      case 'watercolor': return { before: '<div class="wash1"></div><div class="wash2"></div><div class="wash3"></div><div class="glass-card">', after: '</div>' };
      case 'creative-voltage': return { before: '<div class="dark-panel"></div><div class="neon-badge">NEW</div>', after: '' };
      case 'split-pastel': return { before: '<div class="right-half"></div><div class="dot-grid"></div><div class="badge-pill">Style</div>', after: '' };
      case 'vintage-editorial': return { before: '<div class="geo-circle"></div><div class="geo-line"></div><div class="geo-dot"></div>', after: '' };
      case 'pop-art': return { before: '<div class="pa-dots"></div><div class="pa-accent-stripe"></div>', after: '' };
      case 'ink-wash': return { before: '<div class="ink-blob1"></div><div class="ink-blob2"></div>', after: '<div class="seal">\u58A8</div>' };
      case 'retro-arcade': return { before: '<div class="pixel-grid"></div><div class="screen"><div class="score">SCORE: 001,337</div>', after: '<div class="press-start">PRESS START</div></div>' };
      case 'warm-minimal': return { before: '<div class="blob-warm1"></div><div class="blob-warm2"></div><div class="pill-accent">Style Preview</div>', after: '' };
      case 'nihon-modern': return { before: '<div class="line-thin"></div><div class="line-thin2"></div><div class="hinomaru"></div>', after: '' };
      case 'notion': return { before: '<div class="page-container">', after: '<div class="notion-divider"></div><div class="notion-tag">style / gallery</div></div>' };
      case 'claude': return { before: '<div class="warmth-glow"></div><div class="sparkle"></div>', after: '<div class="accent-line"></div>' };
      default: return { before: '', after: '' };
    }
  }

  var deco = getDeco();

  // ── Check for style-specific unique content ──
  var unique = getUniqueSlideContent(s.id, variant, cls, styleCls, deco);
  if (unique) return unique;

  // ── Default content for styles without unique overrides ──
  if (variant === 'title') {
    var title = 'Next Slide';
    var sub = '\u4f60\u7684\u4e0b\u4e2a slide\uff0c\u4f55\u5fc5\u662f PPT';
    var titleHtml = (s.id === 'terminal-green')

    return '<div class="' + cls + ' ' + styleCls + '">' + deco.before + titleHtml + '<div class="subtitle">' + sub + '</div>' + deco.after + '</div>';
  }

  if (variant === 'content') {

  if (variant === 'stats') {

    return '<div class="' + cls + ' ' + styleCls + '">' + deco.before + statHtml + deco.after + '</div>';

  if (variant === 'quote') {

    var gridHtml = '<div class="feature-grid">' + cards.map(function(c) { return '<div class="grid-card"><div class="grid-card-title">' + c.t + '</div><div class="grid-card-desc">' + c.d + '</div></div>'; }).join('') + '</div>';

  return '';
}

// ── Stage + Filmstrip Rendering ──
var VARIANTS = ['title', 'content', 'stats', 'quote', 'grid'];
var VARIANT_LABELS = { title: 'Title Slide', content: 'Content', stats: 'Statistics', quote: 'Quote', grid: 'Feature Grid' };
var totalSlides = 5;
var currentSlide = 0;
var currentStyle = STYLES[0];
var activeFilter = 'all';
var currentView = 'grid'; // 'grid' or 'stage'

// ── Build Filmstrip ──
function renderFilmstrip(filter) {
  var filmstrip = document.getElementById('filmstrip');
  filmstrip.innerHTML = '';
  var filtered = filter === 'all' ? STYLES : STYLES.filter(function(s) { return s.cat === filter; });
  filtered.forEach(function(s) {
    var item = document.createElement('div');
    item.className = 'filmstrip-item' + (s.id === currentStyle.id ? ' active' : '');
    item.dataset.id = s.id;
    item.innerHTML = '<div class="filmstrip-preview">' + slideInner(s, 'mini', 'title') + '</div>' +
      '<div class="filmstrip-name">' + s.name + '</div>';
    item.addEventListener('click', function() {
      selectStyle(s);
    });
    filmstrip.appendChild(item);
  });
}

// ── Load style into stage ──
function selectStyle(s) {
  currentStyle = s;
  currentSlide = 0;

  // Build carousel
  var carousel = document.getElementById('stageCarousel');
  carousel.innerHTML = '';
  VARIANTS.forEach(function(variant) {
    var panel = document.createElement('div');
    panel.className = 'slide-panel';
    panel.innerHTML = slideInner(s, 'full', variant);
    carousel.appendChild(panel);
  });
  carousel.style.transform = 'translateX(0)';

  // Update info
  document.getElementById('stageName').textContent = s.name;
  var badge = document.getElementById('stageBadge');
  badge.className = 'stage-cat-badge ' + BADGE_CLASS[s.cat];
  badge.textContent = BADGE_LABEL[s.cat];

  // Update dots
  renderStageDots();
  updateStageArrows();
  updateSlideTypeLabel();

  // Update filmstrip active state
  document.querySelectorAll('.filmstrip-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.id === s.id);
  });

  // Scroll active filmstrip item into view
  var activeItem = document.querySelector('.filmstrip-item.active');
  if (activeItem) {
    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // Update URL hash
  history.replaceState(null, '', '#' + s.id);

  // Update CTA
  document.getElementById('stageCta').onclick = function() {
    var prompt = 'Create a 10-slide presentation about [your topic] in ' + s.name + ' style';
    navigator.clipboard.writeText(prompt).then(function() {
      var btn = document.getElementById('stageCta');
      btn.textContent = 'Copied!';
      btn.style.background = '#39d353';
      btn.style.color = '#fff';
      setTimeout(function() {
        btn.textContent = 'Copy Prompt';
        btn.style.background = '#fff';
        btn.style.color = '#000';
      }, 2000);
    });
  };
}

function renderStageDots() {
  var dotsContainer = document.getElementById('stageDots');
  dotsContainer.innerHTML = '';
  for (var i = 0; i < totalSlides; i++) {
    var dot = document.createElement('button');
    dot.className = 'stage-dot' + (i === 0 ? ' active' : '');
    dot.dataset.idx = i;
    dot.setAttribute('aria-label', 'Slide ' + (i + 1));
    dot.addEventListener('click', (function(idx) { return function(e) { e.stopPropagation(); goToSlide(idx); }; })(i));
    dotsContainer.appendChild(dot);
  }
}

function goToSlide(idx) {
  if (idx < 0 || idx >= totalSlides) return;
  currentSlide = idx;
  var carousel = document.getElementById('stageCarousel');
  if (carousel) carousel.style.transform = 'translateX(-' + (idx * 100 / totalSlides) + '%)';
  updateStageDots();
  updateStageArrows();
  updateSlideTypeLabel();
}

function updateStageDots() {
  document.querySelectorAll('.stage-dot').forEach(function(dot, i) {
    dot.classList.toggle('active', i === currentSlide);
  });
}

function updateStageArrows() {
  document.getElementById('stageArrowLeft').classList.toggle('disabled', currentSlide === 0);
  document.getElementById('stageArrowRight').classList.toggle('disabled', currentSlide === totalSlides - 1);
}

function updateSlideTypeLabel() {
  document.getElementById('slideTypeLabel').textContent = VARIANT_LABELS[VARIANTS[currentSlide]] || '';
}

// ── Events ──
document.getElementById('stageArrowLeft').addEventListener('click', function(e) { e.stopPropagation(); goToSlide(currentSlide - 1); });
document.getElementById('stageArrowRight').addEventListener('click', function(e) { e.stopPropagation(); goToSlide(currentSlide + 1); });

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') goToSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') goToSlide(currentSlide + 1);
});

// Touch/swipe on stage
var touchStartX = 0;
document.getElementById('stagePreview').addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
document.getElementById('stagePreview').addEventListener('touchend', function(e) {
  var diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 50) { if (diff > 0) goToSlide(currentSlide + 1); else goToSlide(currentSlide - 1); }
}, { passive: true });

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    if (currentView === 'stage') {
      renderFilmstrip(activeFilter);
      // If current style is not in filter, switch to first in filter
      var filtered = activeFilter === 'all' ? STYLES : STYLES.filter(function(s) { return s.cat === activeFilter; });
      if (!filtered.find(function(s) { return s.id === currentStyle.id; })) {
        selectStyle(filtered[0]);
      }
    } else {
      renderOverviewGrid(activeFilter);
    }
  });
});

// Hash URL support
function handleHash() {
  var hash = window.location.hash.slice(1);
  if (hash) {
    var s = STYLES.find(function(x) { return x.id === hash; });
    if (s) selectStyle(s);
  }
}

// ── Overview Grid ──
function renderOverviewGrid(filter) {
  var grid = document.getElementById('overviewGrid');
  grid.innerHTML = '';
  var filtered = filter === 'all' ? STYLES : STYLES.filter(function(s) { return s.cat === filter; });
  filtered.forEach(function(s, idx) {
    var card = document.createElement('div');
    card.className = 'overview-card';
    card.dataset.id = s.id;
    card.style.opacity = '0';
    card.style.transform = 'translateY(24px)';
    card.innerHTML =
      '<div class="overview-card-preview">' + slideInner(s, 'mini', 'title') + '</div>' +
      '<div class="overview-card-info">' +
        '<div class="overview-card-left">' +
          '<div class="overview-card-name">' + s.name + '</div>' +
          '<div class="overview-card-cat">' + CAT_LABELS[s.cat] + '</div>' +
        '</div>' +
        '<div class="overview-card-arrow">&#8250;</div>' +
      '</div>';
    card.addEventListener('click', function() {
      switchView('stage');
      selectStyle(s);
    });
    grid.appendChild(card);
    // Staggered reveal
    setTimeout(function() {
      card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 50 + idx * 60);
  });
}

// ── View Switching ──
function switchView(view) {
  currentView = view;
  var stageArea = document.querySelector('.stage-area');
  var filmstripArea = document.querySelector('.filmstrip-area');
  var overviewArea = document.getElementById('overviewArea');

  document.querySelectorAll('.view-toggle-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.view === view);
  });

  if (view === 'stage') {
    stageArea.classList.remove('hidden');
    filmstripArea.classList.remove('hidden');
    overviewArea.classList.remove('visible');
    renderFilmstrip(activeFilter);
    // Scroll to top smoothly
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    stageArea.classList.add('hidden');
    filmstripArea.classList.add('hidden');
    overviewArea.classList.add('visible');
    renderOverviewGrid(activeFilter);
  }
}

document.querySelectorAll('.view-toggle-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    switchView(btn.dataset.view);
  });
});

// ── Back button ──
document.getElementById('stageBack').addEventListener('click', function() {
  switchView('grid');
  history.replaceState(null, '', window.location.pathname);
});

// ── Init ──
// Start in grid view by default
(function init() {
  var hash = window.location.hash.slice(1);
  if (hash) {
    // Deep link: go straight to stage view for that style
    var s = STYLES.find(function(x) { return x.id === hash; });
    if (s) {
      switchView('stage');
      renderFilmstrip('all');
      selectStyle(s);
      return;
    }
  }
  // Default: show grid overview
  switchView('grid');
})();
</script>

</body>
