<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#100f0d;color:#e8e4df;font-family:'Plus Jakarta Sans',sans-serif;padding:2rem;min-height:100vh}
header{text-align:center;padding:2rem 0 1.5rem}
h1{font-size:2rem;font-weight:700;color:#fff}
h1 span{color:#e8643a}
.subtitle{color:#8a857e;margin:.5rem 0;font-size:.95rem}
.link{color:#e8643a;text-decoration:none;font-size:.85rem;display:inline-block;margin-top:.5rem;transition:opacity .2s}
.link:hover{opacity:.75}
.filters{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1.5rem 0 2rem}
.filters button{background:#1a1917;border:1px solid #2a2825;color:#8a857e;padding:.4rem 1rem;border-radius:99px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:all .2s}
.filters button.active,.filters button:hover{background:#e8643a;color:#fff;border-color:#e8643a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;max-width:1200px;margin:0 auto}
.card{background:#1a1917;border:1px solid #2a2825;border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-3px);border-color:#3a3835}
.card[hidden]{display:none}
.preview{width:100%;height:120px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.preview .deco{position:absolute;inset:0;opacity:.25}
.preview .aa{font-size:2.8rem;position:relative;z-index:1;opacity:.9}
.info{padding:.85rem 1rem}
.name{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:.3rem}
.vibe{font-size:.75rem;color:#8a857e;margin-bottom:.4rem}
.badge{display:inline-block;font-size:.65rem;padding:.15rem .55rem;border-radius:99px;background:#2a2825;color:#8a857e;text-transform:uppercase;letter-spacing:.04em}
footer{text-align:center;padding:2.5rem 0 1rem;color:#4a4540;font-size:.8rem}
footer a{color:#e8643a;text-decoration:none}
@media(max-width:640px){.grid{grid-template-columns:1fr}body{padding:1rem}}
</style>
</head>
<body>
<header>
<h1>Next <span>Slide</span> — Style Gallery</h1>
<p class="subtitle">50+ curated design styles. 你的下个 ppt，何必是 PPT</p>
<a class="link" href="https://next-slide.vercel.app/gallery">View full interactive gallery &rarr;</a>
</header>
<div class="filters">
<button class="active" data-cat="all">All</button>
<button data-cat="dark">Dark</button>
<button data-cat="light">Light</button>
<button data-cat="editorial">Editorial</button>
<button data-cat="bold">Bold</button>
<button data-cat="retro">Retro</button>
<button data-cat="artistic">Artistic</button>
<button data-cat="cultural">Cultural</button>
</div>
<div class="grid" id="grid"></div>
<footer>Made with <a href="https://next-slide.vercel.app">Next Slide</a> &middot; Full gallery at <a href="https://next-slide.vercel.app/gallery">next-slide.vercel.app/gallery</a></footer>
<script>

const g=document.getElementById('grid');
S.forEach(([name,bg,accent,font,vibe,cat,deco])=>{
const light=['light','editorial'].includes(cat)||['#ffffff','#faf8f5','#f5f3ee','#f0e8ff','#F8F6F2','#f5f0e8','#f2ead8','#f5e6dc','#f7f3ee','#f5f3f0','#e8e4f0','#f5f2ed','#F2E8D9','#f7f4ef','#fbfaf8','#ffdd00','#ffe8ee','#E8D5E0','#f2e8d9'].includes(bg);
const textCol=light?'#1a1a1a':'#ffffff';
const c=document.createElement('div');
c.className='card';c.dataset.category=cat;
c.innerHTML=`<div class="preview" style="background:${bg}"><div class="deco" style="background:${deco}"></div><span class="aa" style="color:${accent};font-family:'${font}',sans-serif">Aa</span></div><div class="info"><div class="name">${name}</div><div class="vibe">${vibe}</div><span class="badge">${cat}</span></div>`;
g.appendChild(c);
});
document.querySelector('.filters').addEventListener('click',e=>{
if(e.target.tagName!=='BUTTON')return;
document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
e.target.classList.add('active');
const cat=e.target.dataset.cat;
document.querySelectorAll('.card').forEach(c=>{c.hidden=cat!=='all'&&c.dataset.category!==cat});
});
